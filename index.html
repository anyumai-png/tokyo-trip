mall">搝唔到位置，唔會加入（可用每日「＋新增」再試）</span></div>`).join("")+`<div class="addRow" style="margin-top:8px"><button class="btn" id="aiAdd">加入行程</button></div>`;$("#aiAdd").onclick=()=>{let n=0;const days={};res.forEach((r,i)=>{if(!r.hit)return;const ck=$(`[data-ck="${i}"]`);if(ck&&!ck.checked)return;const sel=$(`[data-ai="${i}"]`);const di=sel?+sel.value:(r.day||0);let pid;if(r.hit.ex){pid=r.hit.ex}else{pid="ai"+Date.now()+"_"+i;addCustom(pid,{n:r.nm,t:"景點",area:((r.addr||"").split(",")[1]||"").trim()||"文字匯入",icon:"📋",note:"文字匯入："+r.addr,tr2:"—",price:"—",hours:"—",site:""},r.coord)}plan[di].stops.push({p:pid,stay:60});days[di]=1;n++});Object.keys(days).forEach(di=>recalcTr(+di));save("已加入 "+n+" 個地點，已重新計算路線及時間");out.innerHTML=`<div class="pqHint">✅ 已加入 ${n} 個地點，去「行程＋地圖」睜下</div>`}};$("#mymapBtn").onclick=()=>{const u=$("#mymapUrl").value||"";const m=u.match(/mid=([\w-]+)/);if(!m){toast("請貼上含 mid= 的 My Maps 連結");return}toast("讀取中…");fetch("https://www.google.com/maps/d/kml?forcekml=1&mid="+m[1]).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{const n=parseKML(t);toast(n?"已匯入 "+n+" 個地點":"連結入面搵唔到地點")}).catch(()=>toast("直接讀取失敗（瀏覽器跨域限制）：請在 My Maps 揀「匯出成 KML」再用右邊按鈕匯入檔案"))};$("#kmlBtn").onclick=()=>$("#kmlFile").click();$("#kmlFile").onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{let n=0;if(/\.(geojson|json)$/i.test(f.name))n=parseGeoJSON(r.result);else n=parseKML(r.result);toast(n?"已匯入 "+n+" 個地點":"檔案入面搵唔到地點")}catch(err){toast("匯入失敗：請確認檔案格式")}};r.readAsText(f)};$("#resetBtn").onclick=()=>{plan=JSON.parse(JSON.stringify(DEFAULT_PLAN));save("已還原預設行程")};$("#expBtn").onclick=()=>{const blob=new Blob([JSON.stringify(plan,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tokyo-plan.json";a.click();URL.revokeObjectURL(a.href)};$("#impBtn").onclick=()=>$("#impFile").click();$("#impFile").onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!Array.isArray(x))throw 0;plan=x;save("已匯入行程")}catch(err){toast("匯入失敗：請選擇本 App 匯出的 JSON")}};r.readAsText(f)}}
/* ===== spend / print / offline ===== */
let spend=[];try{spend=JSON.parse(localStorage.getItem("tokyoSpend")||"[]")}catch(e){spend=[]}
let spCfg={rate:0.053,pax:5};try{spCfg=Object.assign(spCfg,JSON.parse(localStorage.getItem("tokyoSpendCfg")||"{}"))}catch(e){}
const SPCATS=["\u9910\u98f2","\u4ea4\u901a","\u9580\u7968","\u8cfc\u7269","\u4f4f\u5bbf","\u5176\u4ed6"];
let spDay=0,spCat=SPCATS[0];
function saveSpend(){try{localStorage.setItem("tokyoSpend",JSON.stringify(spend));localStorage.setItem("tokyoSpendCfg",JSON.stringify(spCfg))}catch(e){}}
function hm2(t){return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0")}
function yen(n){return "\u00a5"+Math.round(n).toLocaleString()}
function spTotals(){const byDay=plan.map(function(){return 0}),byCat={};let all=0;spend.forEach(function(x){all+=x.amt;if(byDay[x.d]!=null)byDay[x.d]+=x.amt;byCat[x.cat]=(byCat[x.cat]||0)+x.amt});return{all:all,byDay:byDay,byCat:byCat}}
function buildPrint(){var MI={car:"\ud83d\ude97",walk:"\ud83d\udeb6",train:"\ud83d\ude87"};var h='<h1 style="margin:0 0 4px">\u65e5\u672c\u6771\u4eac\u65c5\u884c 7/21\u20137/28\uff082026\uff09</h1><div style="font-size:12px">4\u59271\u5c0f\u30fb\u81ea\u99d5\uff0b\u9435\u8def\u30fb\u6771\u4eac\u7063\u6771\u65b9\u98ef\u5e97</div>';plan.forEach(function(d,i){h+='<div class="pgB"><h2>\u7b2c'+(i+1)+'\u5929 '+d.date+'\uff5c'+d.title+'</h2><table><tr><th>\u6642\u9593</th><th>\u5730\u9ede</th><th>\u505c\u7559</th><th>\u53bb\u4e0b\u4e00\u7ad9</th></tr>';rows(i).forEach(function(r){var m=P[r.p]||{};h+='<tr><td>'+hm2(r.s)+'\u2013'+hm2(r.e)+'</td><td>'+(m.icon||"")+" "+(r.ttl||m.n||r.p)+'</td><td>'+r.stay+'\u5206</td><td>'+(r.tr?(MI[r.tr.mode]||"")+r.tr.min+"\u5206":"\u2014")+'</td></tr>'});h+='</table></div>'});var T=spTotals();if(T.all>0){h+='<h2>\u65c5\u8cbb\u5c0f\u8a08</h2><table><tr><th>\u65e5\u671f</th><th>\u91d1\u984d</th></tr>'+plan.map(function(d,i){return '<tr><td>'+d.date+'</td><td>'+yen(T.byDay[i])+'</td></tr>'}).join("")+'<tr><th>\u5168\u7a0b</th><th>'+yen(T.all)+'</th></tr></table>'}h+='<div style="margin-top:10px;font-size:11px">\u2757\u5f85\u8fa6\uff1a\u6cb3\u53e3\u6e56\uff0f\u5fa1\u6bbf\u5834\u4f4f\u5bbf\uff087/25\u201327\uff09\u30fb\u6771\u4eac\u7063\u6771\u65b9\u7b2c7\u665a\u52a0\u8a02\u30fbYoroniku\u8a02\u4f4d\u30fb\u9580\u7968\u78ba\u8a8d</div>';$("#printSheet").innerHTML=h;window.print()}
function renderSpend(){var T=spTotals(),el=$("#spendPanel");var hk=function(n){return "\u2248HK$"+(n*spCfg.rate).toFixed(0)};
var h='<h3 style="margin:4px 0 10px">\ud83d\udcb0 \u65c5\u8cbb\u8a18\u5e33</h3>';
h+='<div class="spSum"><div class="spCard"><div class="spMut">\u5168\u7a0b\u5408\u8a08</div><div class="spBig">'+yen(T.all)+'</div><div class="spMut">'+hk(T.all)+'</div></div><div class="spCard"><div class="spMut">'+plan[spDay].date+'</div><div class="spBig">'+yen(T.byDay[spDay])+'</div><div class="spMut">'+hk(T.byDay[spDay])+'</div></div><div class="spCard"><div class="spMut">\u4eba\u5747\uff08'+spCfg.pax+'\u4eba\uff09</div><div class="spBig">'+yen(T.all/spCfg.pax)+'</div><div class="spMut">'+hk(T.all/spCfg.pax)+'</div></div></div>';
h+='<div class="spCard"><div style="margin-bottom:6px"><select id="spD" class="spInp">'+plan.map(function(d,i){return '<option value="'+i+'"'+(i===spDay?" selected":"")+'>'+d.date+'</option>'}).join("")+'</select> <input id="spA" class="spInp" type="number" placeholder="\u91d1\u984d \u00a5" style="width:110px"> <input id="spN" class="spInp" placeholder="\u5099\u8a3b\uff08\u53ef\u7559\u7a7a\uff09" style="width:150px"></div><div style="margin-bottom:8px">'+SPCATS.map(function(c){return '<span class="spCat'+(c===spCat?" on":"")+'" data-spc="'+c+'">'+c+'</span>'}).join("")+'</div><button class="spBtn" id="spAdd">\uff0b \u8a18\u4e00\u7b46</button> <button class="spBtn" id="spPrint" style="background:#334155">\ud83d\udda8\ufe0f \u5217\u5370\uff0f\u5b58 PDF \u884c\u7a0b</button> <button class="spBtn" id="spCopy" style="background:#64748b">\ud83d\udccb \u532f\u51fa</button></div>';
var mx=Math.max.apply(null,T.byDay.concat([1]));
h+='<div class="spCard"><div class="spMut" style="margin-bottom:6px">\u6bcf\u65e5\u958b\u652f</div>'+plan.map(function(d,i){return '<div class="spRow" style="border:none;padding:3px 0"><span style="width:88px">'+d.date+'</span><span style="flex:1;margin:0 8px"><span class="spBar" style="display:block;width:'+Math.round(T.byDay[i]/mx*100)+'%"></span></span><span>'+yen(T.byDay[i])+'</span></div>'}).join("")+'</div>';
h+='<div class="spCard"><div class="spMut" style="margin-bottom:6px">\u5206\u985e\u5408\u8a08</div>'+SPCATS.map(function(c){return '<span class="spCat">'+c+' '+yen(T.byCat[c]||0)+'</span>'}).join("")+'</div>';
var es=spend.map(function(x,gi){return{x:x,gi:gi}}).filter(function(o){return o.x.d===spDay});
h+='<div class="spCard"><div class="spMut" style="margin-bottom:6px">'+plan[spDay].date+' \u7d00\u9304\uff08'+es.length+'\u7b46\uff09</div>'+(es.length?es.map(function(o){return '<div class="spRow"><span>'+o.x.cat+(o.x.note?"\u30fb"+o.x.note:"")+'</span><span>'+yen(o.x.amt)+'<span class="spDel" data-spdel="'+o.gi+'">\u2715</span></span></div>'}).join(""):'<div class="spMut">\u672a\u6709\u7d00\u9304</div>')+'</div>';
h+='<div class="spCard spMut">\u532f\u7387 \u00a51=HK$ <input id="spR" class="spInp" type="number" step="0.001" value="'+spCfg.rate+'" style="width:84px"> \u4eba\u6578 <input id="spP" class="spInp" type="number" value="'+spCfg.pax+'" style="width:64px"></div>';
el.innerHTML=h;
$("#spD").onchange=function(e){spDay=+e.target.value;renderSpend()};
$$("[data-spc]").forEach(function(b){if(b.id)return;b.onclick=function(){spCat=b.dataset.spc;renderSpend()}});
$("#spAdd").onclick=function(){var a=+$("#spA").value;if(!a){toast("\u8acb\u8f38\u5165\u91d1\u984d");return}spend.push({d:+$("#spD").value,amt:a,cat:spCat,note:$("#spN").value.trim(),ts:Date.now()});saveSpend();toast("\u5df2\u8a18\u5e33 "+yen(a));renderSpend()};
$$("[data-spdel]").forEach(function(b){b.onclick=function(){spend.splice(+b.dataset.spdel,1);saveSpend();renderSpend()}});
$("#spPrint").onclick=buildPrint;
$("#spCopy").onclick=function(){var T2=spTotals();var t="\ud83d\udcb0 \u6771\u4eac\u4e4b\u65c5\u958b\u652f\n";plan.forEach(function(d,i){var e2=spend.filter(function(x){return x.d===i});if(!e2.length)return;t+="\n"+d.date+"\uff08"+yen(T2.byDay[i])+"\uff09\n";e2.forEach(function(x){t+="\u30fb"+x.cat+(x.note?" "+x.note:"")+" "+yen(x.amt)+"\n"})});t+="\n\u5168\u7a0b "+yen(T2.all)+"\uff08\u2248HK$"+(T2.all*spCfg.rate).toFixed(0)+"\uff09\u30fb\u4eba\u5747 "+yen(T2.all/spCfg.pax);if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){toast("\u5df2\u8907\u88fd")},function(){toast("\u8907\u88fd\u5931\u6557")})}else{toast("\u6b64\u74b0\u5883\u4e0d\u652f\u63f4\u8907\u88fd")}};
$("#spR").onchange=function(e){spCfg.rate=+e.target.value||0.053;saveSpend();renderSpend()};
$("#spP").onchange=function(e){spCfg.pax=Math.max(1,+e.target.value||5);saveSpend();renderSpend()};
}

applyPrefs();document.addEventListener("click",e=>{if(e.target.id==="bigTxt"){localStorage.setItem("bigText",document.body.classList.contains("bigText")?"0":"1");applyPrefs();renderSet()}if(e.target.id==="hiCon"){localStorage.setItem("hiCon",document.body.classList.contains("hiCon")?"0":"1");applyPrefs();renderSet()}});
