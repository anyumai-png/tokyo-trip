function nearestDay(coord){function havKm(a,b){const R=6371,d1=(b[0]-a[0])*Math.PI/180,d2=(b[1]-a[1])*Math.PI/180,q=Math.sin(d1/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(d2/2)**2;return 2*R*Math.asin(Math.sqrt(q))}let best=0,bd=1e9;plan.forEach((d,x)=>{d.stops.forEach(st=>{if(!C[st.p])return;const dd=havKm(coord,C[st.p]);if(dd<bd){bd=dd;best=x}})});return best}

function bindPq(){const inp=$("#pq"),drop=$("#pqDrop");if(!inp||inp._b)return;inp._b=1;inp.oninput=()=>{const q=inp.value.trim();renderFinder();clearTimeout(pqTimer);if(q.length<2){drop.style.display="none";return}drop.style.display="block";drop.innerHTML=`<div class="pqHint">搜尋中…</div>`;pqTimer=setTimeout(()=>{const seq=++pqSeq;fetch("https://nominatim.openstreetmap.org/search?format=json&namedetails=1&limit=8&accept-language=zh-HK,zh,en&countrycodes=jp&q="+encodeURIComponent(q)).then(r=>r.json()).then(list=>{if(seq!==pqSeq)return;if(!list.length){drop.innerHTML=`<div class="pqHint">網上搝唔到相關地點，試下用英文／日文關鍵字</div>`;return}drop.innerHTML=list.map((it,i)=>`<div class="pqItem" data-qi="${i}"><span>📍</span><span><b>${nmOf(it).main}</b>${nmOf(it).alt?` <span class="small">（${nmOf(it).alt}）</span>`:""}<br><span class="small">${it.display_name}</span></span></div>`).join("");$$("#pqDrop [data-qi]").forEach(el=>el.onclick=()=>{const it=list[+el.dataset.qi];const nm=nmOf(it).main;const id="srch"+Date.now();addCustom(id,{n:nm,t:"景點",area:(it.display_name.split(",")[1]||"").trim()||"搜尋加入",icon:"🔎",note:"由搜尋加入："+it.display_name,tr2:"—",price:"—",hours:"—",site:""},[+it.lat,+it.lon]);drop.style.display="none";inp.value="";selPlace=id;renderFinder();showPlaceDetail(id)})}).catch(()=>{if(seq===pqSeq)drop.innerHTML=`<div class="pqHint">網絡連線失敗，暫時搜尋唔到（可改用地圖「✨ 附近景點」或匯入 KML）</div>`})},450)};document.addEventListener("click",e=>{if(!drop.contains(e.target)&&e.target!==inp)drop.style.display="none"})}
function renderFinder(){bindPq();const fq=($("#pq")?$("#pq").value:"").trim().toLowerCase();$("#finderGrid").innerHTML=Object.keys(P).filter(id=>!fq||(P[id].n+" "+P[id].t+" "+P[id].area).toLowerCase().indexOf(fq)>-1).map(id=>`<div class="pCard${selPlace===id?" sel":""}" data-pid="${id}"><span class="favH${favs[id]?" on":""}" data-fav="${id}">♥</span><div class="ico">${P[id].icon}</div><b>${P[id].n}</b><span class="small">${P[id].t} · ${P[id].area}</span></div>`).join("");$$("[data-pid]").forEach(c=>c.onclick=()=>{selPlace=c.dataset.pid;renderFinder();showPlaceDetail(selPlace)});$$(".favH").forEach(f=>{f.onclick=e=>{e.stopPropagation();const id=f.dataset.fav;const add=!favs[id];if(add)favs[id]=1;else delete favs[id];saveFavs();renderFinder();toast(add?"已收藏："+P[id].n:"已取消收藏："+P[id].n)}})}
function bookLinks(id){const p=P[id];const isH=/酒店|飯店|旅館|住宿|Hotel/i.test((p.n||"")+" "+(p.t||""));const kaw=/河口湖|富士|山中湖|御殿場/.test((p.n||"")+(p.area||""));const ci=kaw?"2026-07-25":"2026-07-21",co=kaw?"2026-07-27":"2026-07-24";const q=encodeURIComponent((p.n||"").replace(/（[^）]*）/g,"").trim());let L;if(isH){L=[["Booking.com","https://www.booking.com/searchresults.zh-tw.html?ss="+q+"&checkin="+ci+"&checkout="+co+"&group_adults=4&group_children=1&age=7&no_rooms=2"],["Agoda","https://www.agoda.com/zh-hk/search?textToSearch="+q+"&checkIn="+ci+"&adults=4&children=1&rooms=2"],["Trip.com","https://hk.trip.com/hotels/list?searchWord="+q+"&checkIn="+ci+"&checkOut="+co+"&adult=4&children=1"],["Airbnb","https://www.airbnb.com/s/"+q+"/homes?checkin="+ci+"&checkout="+co+"&adults=4&children=1"]]}else{L=[["Klook","https://www.klook.com/zh-HK/search/result/?query="+q],["KKday","https://www.kkday.com/zh-hk/product/productlist?keyword="+q],["Trip.com 門票","https://hk.trip.com/things-to-do/list?keyword="+q]]}return '<div class="iB"><b>'+(isH?"訂房比價（已代入日期・4大1小）":"訂票比價")+'</b><span>'+L.map(function(x){return '<a target="_blank" href="'+x[1]+'">'+x[0]+' ↗</a>'}).join("　")+'</span></div>'}
function showPlaceDetail(id){const p=P[id];const visits=[];plan.forEach((d,i)=>rows(i).forEach(r=>{if(r.p===id)visits.push(`第${i+1}天（${d.date}）${clock(r.s)}–${clock(r.e)}`)}));$("#placeDetail").innerHTML=`<button class="dClose" id="dClose">✕</button><h3>${p.icon} ${p.n}</h3><div class="meta">${p.t} · ${p.area}${visits.length?" · 已在行程："+visits.join("；"):""}</div><div class="iGrid"><div class="iB"><b>基本資訊</b><span>${p.note}</span></div><div class="iB"><b>交通</b><span>${p.tr2}</span></div><div class="iB"><b>價格</b><span>${p.price}</span></div><div class="iB"><b>開放日期／時間</b><span>${p.hours}</span></div><div class="iB"><b>連結</b><span><a target="_blank" href="${gmapPt(id)}">Google Maps ↗</a>${p.site?`　<a target="_blank" href="${p.site}">官方網站 ↗</a>`:""}</span></div>${bookLinks(id)}</div><div class="addRow"><select id="addDay">${plan.map((d,i)=>`<option value="${i}">第${i+1}天 · ${d.date}</option>`).join("")}</select><select id="addStay"><option value="30">停留 30 分</option><option value="60" selected>停留 1 小時</option><option value="90">停留 1.5 小時</option><option value="120">停留 2 小時</option><option value="180">停留 3 小時</option></select><button class="btn pri" id="addBtn">加入行程</button><button class="btn" id="poolBtn">加入暫存區</button></div>`;$("#placeDetail").classList.add("open");$("#dClose").onclick=()=>{$("#placeDetail").classList.remove("open")};$("#addBtn").onclick=()=>{const di=+$("#addDay").value,st=+$("#addStay").value,stops=plan[di].stops;stops.push({p:id,stay:st});recalcTr(di);save(`已加入第${di+1}天，已重新計算路線及時間`);showPlaceDetail(id)};$("#poolBtn").onclick=()=>{const di=+$("#addDay").value;plan[di].pool=plan[di].pool||[];if(plan[di].pool.includes(id)){toast("呢個地點已經喀第"+(di+1)+"天暫存區");return}plan[di].pool.push(id);save("已加入第"+(di+1)+"天暫存區");showPlaceDetail(id)}}
function renderListView(){const q=($("#q").value||"").toLowerCase();let h=`<table class="lt"><thead><tr><th>日期</th><th>時間</th><th>地點</th><th>類型</th><th>停留</th></tr></thead><tbody>`;plan.forEach((d,i)=>rows(i).forEach(r=>{const p=P[r.p];if(!(`第${i+1}天 ${d.date} ${p.n} ${p.t}`.toLowerCase().includes(q)))return;h+=`<tr><td><span class="dayBadge">第${i+1}天</span> <span class="meta">${d.date}</span></td><td>${clock(r.s)}–${clock(r.e)}</td><td><b>${p.n}</b></td><td>${p.t}</td><td>${stayTxt(r.stay)||"—"}</td></tr>`}));$("#listWrap").innerHTML=h+"</tbody></table>"}
function renderSet(){$("#setPanel").innerHTML=`<div class="setCard"><h3>基本資料</h3><p>👪 4 大 1 小（2 位長者）</p><p>✈️ HB322 21/7 14:50 抵成田；HB323 28/7 18:25 返港</p><p>🏨 第 1–4 晚＋第 7 晚：東京灣東方飯店（第 7 晚記得加訂）；第 5–6 晚：河口湖／御殿場一帶（待訂）</p><p>🔴 <b>河口湖住宿（7/25–27・2晚・4大1小）快速比價：</b><a target="_blank" href="https://www.booking.com/searchresults.zh-tw.html?ss=%E6%B2%B3%E5%8F%A3%E6%B9%96&checkin=2026-07-25&checkout=2026-07-27&group_adults=4&group_children=1&age=7&no_rooms=2">Booking ↗</a>　<a target="_blank" href="https://www.agoda.com/zh-hk/search?textToSearch=%E6%B2%B3%E5%8F%A3%E6%B9%96&checkIn=2026-07-25&adults=4&children=1&rooms=2">Agoda ↗</a>　<a target="_blank" href="https://hk.trip.com/hotels/list?searchWord=%E6%B2%B3%E5%8F%A3%E6%B9%96&checkIn=2026-07-25&checkOut=2026-07-27&adult=4&children=1">Trip.com ↗</a>　<a target="_blank" href="https://www.airbnb.com/s/Kawaguchiko--Japan/homes?checkin=2026-07-25&checkout=2026-07-27&adults=4&children=1">Airbnb ↗</a></p><p>🎟️ <b>門票預約：</b><a target="_blank" href="https://teamlabplanets.dmm.com/">teamLab 官方 ↗</a>　<a target="_blank" href="https://www.klook.com/zh-HK/activity/25300-teamlab-planets-toyosu-tokyo-ticket/">teamLab Klook ↗</a>　<a target="_blank" href="https://reserve.tokyodisneyresort.jp/">迪士尼官方 ↗</a>　<a target="_blank" href="https://www.klook.com/zh-HK/search/result/?query=%E6%9D%B1%E4%BA%AC%E8%BF%AA%E5%A3%AB%E5%B0%BC">迪士尼 Klook ↗</a>　<a target="_blank" href="https://www.kidzania.jp/tokyo/">KidZania 官方（7/22 英語星期三）↗</a></p><p>🚗 21–28/7 自駕；28/7 14:00 前成田還車</p></div><div class="setCard"><h3>連接 Google Map／匯入地點</h3><p>支援 <b>Google My Maps</b>：貼上分享連結（地圖需設為公開或知道連結者可睇），或在 My Maps 選單揀「匯出成 KML」後匯入檔案。匯入後地點會出現在「地點探索」同地圖「📍 地點清單」圖層，可直接加入行程。（Google 帳戶內部嘅「已儲存地點」清單無公開接口，暫時連接唔到）</p><input type="text" id="mymapUrl" placeholder="貼上 Google My Maps 分享連結（google.com/maps/d/…）"><div class="addRow"><button class="btn pri" id="mymapBtn">讀取 My Maps</button><button class="btn" id="kmlBtn">匯入 KML／GeoJSON 檔</button><input id="kmlFile" type="file" accept=".kml,.xml,.geojson,.json" style="display:none"></div></div><div class="setCard"><h3>行程資料</h3><p>你在本 App 作出的修改（調動／移除／加入地點）會自動儲存在這個瀏覽器。</p><div class="addRow"><button class="btn" id="resetBtn">還原預設行程</button><button class="btn" id="expBtn">匯出 JSON</button><button class="btn" id="impBtn">匯入 JSON</button><button class="btn" id="txtBtn">複製文字行程</button><button class="btn" id="shareBtn">產生分享連結</button><button class="btn" id="aiBtn">📋 文字匯入（智能分析日期）</button><input id="impFile" type="file" accept="application/json" style="display:none"></div><div id="aiPanel" style="display:none;margin-top:10px"><textarea id="aiText" rows="5" style="width:100%;box-sizing:border-box;border:1px solid #dbe3ea;border-radius:8px;padding:8px;font-size:13px;font-family:inherit" placeholder="每行一句，例：&#10;第2天想去 東京鐵塔&#10;7/25 想去 富士急樂園、音樂盒之森&#10;御殿場附近想食 沼津港"></textarea><div class="addRow" style="margin-top:8px"><button class="btn" id="aiGo">🤖 分析</button></div><div id="aiOut"></div></div></div>`;$("#shareBtn").onclick=()=>{const link=location.href.split("#")[0]+"#plan="+btoa(unescape(encodeURIComponent(JSON.stringify(plan))));function fb(){const ta=document.createElement("textarea");ta.value=link;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("已複製分享連結，對方開啟會見到你嘅行程")}catch(e){toast("複製失敗")}ta.remove()}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(link).then(()=>toast("已複製分享連結，對方開啟會見到你嘅行程")).catch(fb)}else fb()};$("#txtBtn").onclick=()=>{const t=planText();function fallback(){const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("已複製文字行程，可直接貼上分享")}catch(e){toast("複製失敗")}ta.remove()}if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast("已複製文字行程，可直接貼上分享")).catch(fallback)}else fallback()};$("#aiBtn").onclick=()=>{const el=$("#aiPanel");el.style.display=el.style.display==="none"?"block":"none"};$("#aiGo").onclick=async()=>{const t=$("#aiText").value.trim();const out=$("#aiOut");if(!t){out.innerHTML=`<div class="pqHint">請先貼上文字（每行一句）</div>`;return}out.innerHTML=`<div class="pqHint">分析中…</div>`;const items=parseImpText(t);if(!items.length){out.innerHTML=`<div class="pqHint">解析唔到地點，試下每行一個地點</div>`;return}const res=[];for(const item of items){let hit=null,coord=null,nm=item.q,addr="";const lq=item.q.toLowerCase();const ex=Object.keys(P).find(id=>P[id].n.toLowerCase().indexOf(lq)>-1||lq.indexOf(P[id].n.toLowerCase())>-1);if(ex){hit={ex:ex};coord=C[ex];nm=P[ex].n;addr="現有地點 · "+P[ex].area}else{try{const r=await fetch("https://nominatim.openstreetmap.org/search?format=json&namedetails=1&limit=1&accept-language=zh-HK,zh,en&countrycodes=jp&q="+encodeURIComponent(item.q)).then(x=>x.json());if(r&&r.length){hit={osm:r[0]};coord=[+r[0].lat,+r[0].lon];nm=nmOf(r[0]).main;addr=r[0].display_name}}catch(e){}}const day=item.day!=null?item.day:(coord?nearestDay(coord):null);res.push({q:item.q,nm:nm,hit:hit,coord:coord,day:day,why:item.day!=null?"你指定":"就近建議",addr:addr})}out.innerHTML=res.map((r,i)=>r.hit?`<div class="aiRow"><input type="checkbox" data-ck="${i}" checked><span>✅ <b>${r.nm}</b><br><span class="small">${r.addr}</span></span><span class="small">${r.why}→</span><select data-ai="${i}">${plan.map((d,x)=>`<option value="${x}"${r.day===x?" selected":""}>第${x+1}天 ${d.date}</option>`).join("")}</select></div>`:`<div class="aiRow">❓ <b>${r.q}</b> <span class="small">搝唔到位置，唔會加入（可用每日「＋新增」再試）</span></div>`).join("")+`<div class="addRow" style="margin-top:8px"><button class="btn" id="aiAdd">加入行程</button></div>`;$("#aiAdd").onclick=()=>{let n=0;const days={};res.forEach((r,i)=>{if(!r.hit)return;const ck=$(`[data-ck="${i}"]`);if(ck&&!ck.checked)return;const sel=$(`[data-ai="${i}"]`);const di=sel?+sel.value:(r.day||0);let pid;if(r.hit.ex){pid=r.hit.ex}else{pid="ai"+Date.now()+"_"+i;addCustom(pid,{n:r.nm,t:"景點",area:((r.addr||"").split(",")[1]||"").trim()||"文字匯入",icon:"📋",note:"文字匯入："+r.addr,tr2:"—",price:"—",hours:"—",site:""},r.coord)}plan[di].stops.push({p:pid,stay:60});days[di]=1;n++});Object.keys(days).forEach(di=>recalcTr(+di));save("已加入 "+n+" 個地點，已重新計算路線及時間");out.innerHTML=`<div class="pqHint">✅ 已加入 ${n} 個地點，去「行程＋地圖」睜下</div>`}};$("#mymapBtn").onclick=()=>{const u=$("#mymapUrl").value||"";const m=u.match(/mid=([\w-]+)/);if(!m){toast("請貼上含 mid= 的 My Maps 連結");return}toast("讀取中…");fetch("https://www.google.com/maps/d/kml?forcekml=1&mid="+m[1]).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{const n=parseKML(t);toast(n?"已匯入 "+n+" 個地點":"連結入面搵唔到地點")}).catch(()=>toast("直接讀取失敗（瀏覽器跨域限制）：請在 My Maps 揀「匯出成 KML」再用右邊按鈕匯入檔案"))};$("#kmlBtn").onclick=()=>$("#kmlFile").click();$("#kmlFile").onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{let n=0;if(/\.(geojson|json)$/i.test(f.name))n=parseGeoJSON(r.result);else n=parseKML(r.result);toast(n?"已匯入 "+n+" 個地點":"檔案入面搵唔到地點")}catch(err){toast("匯入失敗：請確認檔案格式")}};r.readAsText(f)};$("#resetBtn").onclick=()=>{plan=JSON.parse(JSON.stringify(DEFAULT_PLAN));save("已還原預設行程")};$("#expBtn").onclick=()=>{const blob=new Blob([JSON.stringify(plan,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tokyo-plan.json";a.click();URL.revokeObjectURL(a.href)};$("#impBtn").onclick=()=>$("#impFile").click();$("#impFile").onchange=e=>{const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!Array.isArray(x))throw 0;plan=x;save("已匯入行程")}catch(err){toast("匯入失敗：請選擇本 App 匯出的 JSON")}};r.readAsText(f)}}
